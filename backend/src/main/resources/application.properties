supabase.jwt.secret=${SUPABASE_JWT_SECRET:UCpWDTIwLlclQFBLzAOg5VnIqsUWRGQMykr/fhOkOQbFW8Ne2ForiCVJUw4nI9faBa8yGOHa/5sySK1cuqhSdg==}
