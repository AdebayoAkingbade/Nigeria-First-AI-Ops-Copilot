spring.application.name=kudipal-backend

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.ldwcxmzgazzzefemwjdn.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:Bolanle@2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# Restore dialect to allow app to start even if connection is slow/unstable
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings
# Use Port 6543 (Supabase Transaction Pooler) if 5432 is blocked by your network
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SUPABASE_DB_USER:postgres.ldwcxmzgazzzefemwjdn}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT Configuration for Supabase Auth (JWKS)
# Supabase exposes public keys at the .well-known path
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://ldwcxmzgazzzefemwjdn.supabase.co/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://ldwcxmzgazzzefemwjdn.supabase.co/auth/v1
